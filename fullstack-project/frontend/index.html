<!DOCTYPE html>
<html>
<head>
<title>Full Stack Jenkins Deployment</title>
</head>
<body>

<h1>Full Stack Jenkins Deployment</h1>

<button onclick="getData()">touch the going to backend .</button>

<p id="result"></p>

<script>
function getData(){
fetch('/api')
.then(res => res.json())
.then(data => {
document.getElementById("result").innerText = data.message;
})
}
</script>

</body>
</html>
